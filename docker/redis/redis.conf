bind 0.0.0.0
port 6379
timeout 300
tcp-keepalive 60
daemonize no
loglevel notice
databases 16

# Security
requirepass ""

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Persistence - RDB
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Persistence - AOF
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Performance
hz 10
aof-rewrite-incremental-fsync yes
activerehashing yes

# Clients
maxclients 128
