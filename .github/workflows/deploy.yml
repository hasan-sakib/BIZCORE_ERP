name: BizCore ERP Production Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================
  # Job: prepare
  # Determine the image tag and validate inputs
  # ============================================================
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve_tag.outputs.tag }}
      environment: ${{ steps.resolve_env.outputs.env }}

    steps:
      - name: Resolve image tag
        id: resolve_tag
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved image tag: $TAG"

      - name: Resolve target environment
        id: resolve_env
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            ENV="production"
          else
            ENV="${{ github.event.inputs.environment }}"
          fi
          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "Resolved environment: $ENV"

  # ============================================================
  # Job: deploy
  # SSH into production server and perform a rolling update
  # ============================================================
  deploy:
    name: Deploy to ${{ needs.prepare.outputs.environment }}
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ needs.prepare.outputs.environment }}

    concurrency:
      group: deploy-${{ needs.prepare.outputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull new Docker image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.image_tag }}"
            echo "Pulling image: $IMAGE"
            docker pull "$IMAGE"
            echo "Image pulled successfully."

      - name: Run database migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.image_tag }}"
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR || '/opt/bizcore-erp' }}"

            echo "Running database migrations..."
            docker run --rm \
              --env-file "$DEPLOY_DIR/.env" \
              --network bizcore_network \
              "$IMAGE" \
              php database/migrate.php
            echo "Migrations completed."

      - name: Perform rolling update (zero-downtime)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.image_tag }}"
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR || '/opt/bizcore-erp' }}"
            COMPOSE_FILE="$DEPLOY_DIR/docker-compose.prod.yml"

            echo "Starting rolling update..."
            cd "$DEPLOY_DIR"

            # Update image tag in compose env
            sed -i "s|APP_IMAGE=.*|APP_IMAGE=$IMAGE|" .env

            # Scale up new containers first (blue-green within compose)
            docker compose -f "$COMPOSE_FILE" up -d --no-deps --scale app=2 app

            # Wait for new containers to pass health check
            echo "Waiting for new containers to become healthy..."
            sleep 15

            NEW_CONTAINER=$(docker compose -f "$COMPOSE_FILE" ps -q app | tail -n 1)
            for i in {1..12}; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$NEW_CONTAINER" 2>/dev/null || echo "unknown")
              if [[ "$STATUS" == "healthy" ]]; then
                echo "New container is healthy."
                break
              fi
              echo "Health check attempt $i/12 — status: $STATUS"
              sleep 5
            done

            # Scale back down to desired replica count
            docker compose -f "$COMPOSE_FILE" up -d --no-deps --scale app=1 app

            # Reload nginx to clear connections
            docker compose -f "$COMPOSE_FILE" exec -T nginx nginx -s reload || true

            echo "Rolling update complete."

      - name: Verify deployment health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            APP_URL="${{ secrets.APP_URL || 'http://localhost:8080' }}"
            echo "Verifying health endpoint: $APP_URL/health"
            for i in {1..5}; do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health" || echo "000")
              if [[ "$HTTP_STATUS" == "200" ]]; then
                echo "Health check passed (HTTP $HTTP_STATUS)."
                exit 0
              fi
              echo "Health check attempt $i/5 — HTTP $HTTP_STATUS"
              sleep 5
            done
            echo "ERROR: Health check failed after 5 attempts."
            exit 1

      - name: Clean up old Docker images
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            docker image prune -f --filter "until=72h" || true
            echo "Old images pruned."

      - name: Notify Slack on success
        if: success() && vars.SLACK_NOTIFICATIONS_ENABLED == 'true'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "*BizCore ERP deployed successfully* :white_check_mark:",
              "attachments": [
                {
                  "color": "#36a64f",
                  "fields": [
                    {"title": "Environment", "value": "${{ needs.prepare.outputs.environment }}", "short": true},
                    {"title": "Image Tag",   "value": "${{ needs.prepare.outputs.image_tag }}",  "short": true},
                    {"title": "Triggered by","value": "${{ github.actor }}",                      "short": true},
                    {"title": "Commit",      "value": "${{ github.sha }}",                        "short": true}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure() && vars.SLACK_NOTIFICATIONS_ENABLED == 'true'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "*BizCore ERP deployment FAILED* :x:",
              "attachments": [
                {
                  "color": "#ff0000",
                  "fields": [
                    {"title": "Environment", "value": "${{ needs.prepare.outputs.environment }}", "short": true},
                    {"title": "Image Tag",   "value": "${{ needs.prepare.outputs.image_tag }}",  "short": true},
                    {"title": "Triggered by","value": "${{ github.actor }}",                      "short": true},
                    {"title": "Run URL",     "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
