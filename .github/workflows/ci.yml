name: BizCore ERP CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Job: test
  # Run PHPUnit test suite against MySQL 8 + Redis
  # ============================================================
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bizcore_testing
          MYSQL_USER: bizcore
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, redis, json, mbstring, openssl, gd, bcmath, intl, zip, xml
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file for testing
        run: cp .env.example .env.testing

      - name: Configure test environment
        run: |
          sed -i 's/DB_HOST=mysql/DB_HOST=127.0.0.1/' .env.testing
          sed -i 's/DB_DATABASE=bizcore_erp/DB_DATABASE=bizcore_testing/' .env.testing
          sed -i 's/DB_USERNAME=bizcore/DB_USERNAME=bizcore/' .env.testing
          sed -i 's/DB_PASSWORD=secret/DB_PASSWORD=secret/' .env.testing
          sed -i 's/REDIS_HOST=redis/REDIS_HOST=127.0.0.1/' .env.testing
          sed -i 's/APP_ENV=local/APP_ENV=testing/' .env.testing

      - name: Generate application key
        run: php -r "require 'vendor/autoload.php'; \$dotenv = Dotenv\Dotenv::createImmutable('.', '.env.testing'); \$dotenv->load(); echo 'base64:'.base64_encode(random_bytes(32));" > /tmp/app_key.txt && APP_KEY=$(cat /tmp/app_key.txt) && sed -i "s|APP_KEY=.*|APP_KEY=$APP_KEY|" .env.testing

      - name: Wait for MySQL to be ready
        run: |
          until mysql -h 127.0.0.1 -u bizcore -psecret bizcore_testing -e "SELECT 1" > /dev/null 2>&1; do
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL is ready."

      - name: Run database migrations
        env:
          APP_ENV: testing
        run: php database/migrate.php
        continue-on-error: false

      - name: Run PHPUnit test suite with coverage
        env:
          APP_ENV: testing
        run: |
          ./vendor/bin/phpunit \
            --configuration phpunit.xml \
            --coverage-clover storage/coverage/clover.xml \
            --coverage-html storage/coverage/html \
            --log-junit storage/coverage/junit.xml \
            --testdox

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: storage/coverage/junit.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: storage/coverage/html/

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: storage/coverage/clover.xml
          flags: unittests
          name: bizcore-erp-coverage
          fail_ci_if_error: false

  # ============================================================
  # Job: lint
  # Static analysis — PHP_CodeSniffer (PSR-12) + PHPStan lvl 8
  # ============================================================
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, json, mbstring, openssl, gd, bcmath, intl
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies (with dev)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHP_CodeSniffer (PSR-12)
        run: ./vendor/bin/phpcs --standard=phpcs.xml --report=full --report-file=phpcs-report.txt || true

      - name: Upload CodeSniffer report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpcs-report
          path: phpcs-report.txt

      - name: Run PHPStan (level 8)
        run: ./vendor/bin/phpstan analyse --configuration=phpstan.neon --error-format=github

  # ============================================================
  # Job: docker
  # Build and push Docker image to GHCR (main branch only)
  # ============================================================
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/php/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_ENV=production
            PHP_VERSION=${{ env.PHP_VERSION }}
